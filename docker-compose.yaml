services:
  postgres:
    image: postgres:16
    container_name: postgres-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: task-manager
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private_network

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/task-manager
      API_CORS_ALLOWED_ORIGINS: http://localhost:4200
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
    networks:
      - private_network
      - public_network

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on: 
      - backend
    restart: always
    networks:
      - public_network
    
networks:
  private_network:
    driver: bridge
  public_network:
    driver: bridge

volumes:
  postgres_data:
